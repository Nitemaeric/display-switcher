<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg3" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg3)"/>

  <!-- Back monitor (TV, larger) -->
  <g filter="url(#shadow3)" transform="translate(280 180)">
    <rect x="0" y="0" width="464" height="300" rx="28" fill="#1e293b"/>
    <rect x="20" y="20" width="424" height="232" rx="16" fill="#1d4ed8"/>
    <rect x="176" y="96" width="112" height="80" rx="12" fill="#fff" opacity="0.15"/>
    <path d="M 214 116 L 214 156 L 250 136 Z" fill="#fff" opacity="0.9"/>
  </g>

  <!-- Front monitor (desktop, smaller, offset) -->
  <g filter="url(#shadow3)" transform="translate(180 420)">
    <rect x="0" y="0" width="380" height="260" rx="24" fill="#334155"/>
    <rect x="18" y="18" width="344" height="200" rx="14" fill="#e2e8f0"/>
    <rect x="36" y="36" width="308" height="24" rx="6" fill="#fff"/>
    <circle cx="52" cy="48" r="5" fill="#2563eb"/>
    <circle cx="68" cy="48" r="5" fill="#60a5fa"/>
    <circle cx="84" cy="48" r="5" fill="#93c5fd"/>
    <rect x="36" y="78" width="200" height="12" rx="6" fill="#94a3b8"/>
    <rect x="36" y="102" width="160" height="12" rx="6" fill="#cbd5e1"/>
    <rect x="36" y="126" width="180" height="12" rx="6" fill="#e2e8f0"/>
    <rect x="36" y="160" width="130" height="44" rx="10" fill="#bfdbfe"/>
    <rect x="180" y="160" width="130" height="44" rx="10" fill="#dbeafe"/>
  </g>

  <!-- Toggle pill -->
  <g transform="translate(262 700)">
    <rect x="0" y="0" width="500" height="120" rx="60" fill="#1e293b" stroke="#334155" stroke-width="6"/>
    <!-- track highlight -->
    <rect x="12" y="12" width="476" height="96" rx="48" fill="#0f172a" opacity="0.6"/>
    <!-- active knob (right = TV) -->
    <rect x="256" y="12" width="232" height="96" rx="48" fill="#2563eb"/>
    <!-- icons in pill -->
    <!-- desktop icon left -->
    <rect x="72" y="44" width="56" height="32" rx="6" fill="#64748b"/>
    <rect x="80" y="52" width="40" height="16" rx="3" fill="#cbd5e1"/>
    <!-- TV icon right -->
    <rect x="344" y="40" width="72" height="48" rx="8" fill="#fff" opacity="0.95"/>
    <rect x="356" y="52" width="48" height="24" rx="4" fill="#1d4ed8"/>
    <path d="M 368 58 L 368 70 L 384 64 Z" fill="#fff"/>
  </g>

  <!-- Subtle connector lines -->
  <path d="M 512 500 L 512 680" stroke="#3b82f6" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
  <circle cx="512" cy="500" r="14" fill="#3b82f6" opacity="0.5"/>
</svg>