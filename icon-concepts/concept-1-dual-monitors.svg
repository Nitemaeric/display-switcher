<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="screenLight1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="screenDark1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- App icon background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg1)"/>

  <!-- Swap arc (back layer) -->
  <path d="M 430 300 C 512 220, 620 220, 700 300" stroke="#3b82f6" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.55"/>
  <path d="M 594 724 C 512 804, 404 804, 324 724" stroke="#60a5fa" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.55"/>

  <!-- Left monitor (desktop) -->
  <g filter="url(#shadow1)" transform="translate(148 300)">
    <rect x="0" y="0" width="300" height="220" rx="18" fill="#1e293b"/>
    <rect x="14" y="14" width="272" height="168" rx="10" fill="url(#screenLight1)"/>
    <!-- window chrome -->
    <rect x="28" y="28" width="244" height="22" rx="6" fill="#fff" opacity="0.9"/>
    <circle cx="42" cy="39" r="5" fill="#2563eb"/>
    <circle cx="58" cy="39" r="5" fill="#93c5fd"/>
    <circle cx="74" cy="39" r="5" fill="#bfdbfe"/>
    <!-- content lines -->
    <rect x="36" y="68" width="180" height="10" rx="5" fill="#fff" opacity="0.85"/>
    <rect x="36" y="90" width="140" height="10" rx="5" fill="#fff" opacity="0.65"/>
    <rect x="36" y="112" width="160" height="10" rx="5" fill="#fff" opacity="0.5"/>
    <!-- stand -->
    <rect x="118" y="220" width="64" height="18" rx="4" fill="#334155"/>
    <rect x="88" y="238" width="124" height="14" rx="7" fill="#475569"/>
  </g>

  <!-- Right monitor (TV) -->
  <g filter="url(#shadow1)" transform="translate(576 360)">
    <rect x="0" y="0" width="360" height="240" rx="20" fill="#1e293b"/>
    <rect x="16" y="16" width="328" height="184" rx="12" fill="url(#screenDark1)"/>
    <!-- play / media cue -->
    <circle cx="180" cy="108" r="42" fill="#fff" opacity="0.18"/>
    <path d="M 168 84 L 168 132 L 206 108 Z" fill="#fff" opacity="0.95"/>
    <!-- stand -->
    <rect x="148" y="240" width="64" height="20" rx="4" fill="#334155"/>
    <rect x="108" y="260" width="144" height="16" rx="8" fill="#475569"/>
  </g>

  <!-- Swap arrows (front layer) -->
  <g stroke="#fff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 700 300 L 748 300 L 724 268"/>
    <path d="M 324 724 L 276 724 L 300 756"/>
  </g>
  <circle cx="512" cy="512" r="52" fill="#2563eb"/>
  <path d="M 492 492 L 532 512 L 492 532 Z" fill="#fff"/>
  <path d="M 532 492 L 492 512 L 532 532 Z" fill="#fff" opacity="0.55"/>
</svg>