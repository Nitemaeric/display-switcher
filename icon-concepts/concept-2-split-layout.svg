<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="leftPane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="rightPane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg2)"/>

  <!-- Single monitor frame -->
  <g filter="url(#shadow2)" transform="translate(162 220)">
    <rect x="0" y="0" width="700" height="480" rx="36" fill="#1f2937"/>
    <rect x="24" y="24" width="652" height="396" rx="20" fill="#0f172a"/>

    <!-- Left layout: desktop -->
    <rect x="24" y="24" width="318" height="396" rx="20" fill="url(#leftPane)"/>
    <rect x="48" y="52" width="270" height="28" rx="8" fill="#fff" opacity="0.92"/>
    <circle cx="66" cy="66" r="6" fill="#2563eb"/>
    <circle cx="86" cy="66" r="6" fill="#60a5fa"/>
    <circle cx="106" cy="66" r="6" fill="#93c5fd"/>
    <rect x="48" y="100" width="210" height="14" rx="7" fill="#fff" opacity="0.8"/>
    <rect x="48" y="128" width="170" height="14" rx="7" fill="#fff" opacity="0.6"/>
    <rect x="48" y="156" width="190" height="14" rx="7" fill="#fff" opacity="0.45"/>
    <!-- 2x2 grid -->
    <rect x="48" y="210" width="118" height="88" rx="12" fill="#fff" opacity="0.35"/>
    <rect x="180" y="210" width="118" height="88" rx="12" fill="#fff" opacity="0.28"/>
    <rect x="48" y="314" width="118" height="88" rx="12" fill="#fff" opacity="0.22"/>
    <rect x="180" y="314" width="118" height="88" rx="12" fill="#fff" opacity="0.18"/>

    <!-- Right layout: TV / media -->
    <rect x="358" y="24" width="318" height="396" rx="20" fill="url(#rightPane)"/>
    <rect x="382" y="52" width="270" height="28" rx="8" fill="#fff" opacity="0.2"/>
    <circle cx="612" cy="222" r="72" fill="#fff" opacity="0.16"/>
    <path d="M 584 182 L 584 262 L 652 222 Z" fill="#fff" opacity="0.95"/>
    <rect x="430" y="330" width="200" height="12" rx="6" fill="#fff" opacity="0.35"/>
    <rect x="460" y="354" width="140" height="12" rx="6" fill="#fff" opacity="0.25"/>

    <!-- Diagonal split highlight -->
    <path d="M 342 24 L 358 24 L 358 420 L 342 420 Z" fill="#fff" opacity="0.08"/>
    <line x1="342" y1="24" x2="342" y2="420" stroke="#fff" stroke-width="6" opacity="0.35"/>

    <!-- Center swap badge -->
    <circle cx="342" cy="222" r="56" fill="#2563eb" stroke="#fff" stroke-width="8"/>
    <path d="M 322 202 L 362 222 L 322 242" stroke="#fff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M 362 202 L 322 222 L 362 242" stroke="#fff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>

    <!-- Stand -->
    <rect x="286" y="480" width="128" height="28" rx="8" fill="#374151"/>
    <rect x="226" y="508" width="248" height="20" rx="10" fill="#4b5563"/>
  </g>
</svg>